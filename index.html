<main class="main">
  <div class="topbar">
    <button class="ham-btn" id="ham-btn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <div style="flex:1;min-width:0">

      <div class="page-sub" id="top-sub">Proyecto general · 3 pasos</div>
    </div>
    <div class="timer" id="timer">⏱ 0:00</div>
  </div>
  <div id="app"></div>
</main>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<!-- App -->
<script src="js/app.js?v=13"></script>
<script src="js/views/dashboard.js?v=6"></script>
<script src="js/views/cotizar.js?v=9"></script>
<script src="js/views/procesos.js?v=3"></script>
<script src="js/views/maquinas.js?v=4"></script>
<script src="js/views/sustratos.js?v=3"></script>
<script src="js/views/tarifario.js?v=9"></script>
<script src="js/views/clientes.js?v=1"></script>
<script src="js/views/perfil.js?v=1"></script>
<script src="js/views/plan.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<!-- Sidebar overlay (mobile drawer) -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Auth guard — runs after all scripts are loaded -->
<script>
  auth.onAuthStateChanged(async user => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    const onboarded = await isOnboarded(user.uid);
    if (!onboarded) {
      window.location.href = 'onboarding.html';
      return;
    }
    // Populate sidebar user info
    const profile = getProfile();
    const nameStr = profile.nombre || user.displayName || user.email || '?';
    const initials = nameStr.split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    document.getElementById('sidebar-avatar').textContent = initials;
    document.getElementById('sidebar-user-name').textContent = profile.imprenta || 'Mi imprenta';
    document.getElementById('sidebar-user-email').textContent = user.email || '';
    document.getElementById('sidebar-user').style.display = 'flex';
    // Show app
    document.getElementById('auth-loading').style.display = 'none';
  });
</script>
<!-- Hamburger / sidebar drawer (mobile) -->
<script>
  (function() {
    const hamBtn  = document.getElementById('ham-btn');
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    function openSidebar() {
      sidebar.classList.add('open');
      hamBtn.classList.add('open');
      overlay.style.display = 'block';
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      hamBtn.classList.remove('open');
      overlay.style.display = 'none';
      document.body.style.overflow = '';
    }

    hamBtn.addEventListener('click', () =>
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
    );
    overlay.addEventListener('click', closeSidebar);

    // Auto-close al navegar en mobile
    document.querySelectorAll('.nav-item').forEach(item =>
      item.addEventListener('click', () => { if (window.innerWidth < 768) closeSidebar(); })
    );
    // Cerrar con Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });
  })();
</script>
</body>
</html>
