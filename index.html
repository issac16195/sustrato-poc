<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sustrato — Motor de Cotización</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="sidebar">
  <div class="logo">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <path d="M3 22 L15 28 L27 22 L15 16 Z" fill="#00BDA5" opacity="0.3"/>
          <path d="M3 18 L15 24 L27 18 L15 12 Z" fill="#00BDA5" opacity="0.55"/>
          <path d="M3 14 L15 20 L27 14 L15 8 Z" fill="#00BDA5" opacity="0.8"/>
          <path d="M3 10 L15 16 L27 10 L15 4 Z" fill="#00BDA5"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">SUSTRATO</div>
        <div class="logo-tag">Software de Prensa</div>
      </div>
    </div>
  </div>
  <div class="nav-group">Principal</div>
  <div class="nav-item" onclick="showView('dashboard',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
    Dashboard
  </div>
  <div class="nav-item active" onclick="showView('cotizar',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Nueva cotización
  </div>
  <div class="nav-item" onclick="showView('procesos',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Procesos
  </div>
  <div class="nav-group">CRM</div>
  <div class="nav-item" onclick="showView('clientes',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M1 13c0-2.5 2.2-4 5-4s5 1.5 5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M12 11c1.5.3 3 1.2 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    Clientes
  </div>
  <div class="nav-group">Configuración</div>
  <div class="nav-item" onclick="showView('perfil',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><rect x="2" y="1" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 14h6M8 11v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Mi imprenta
  </div>
  <div class="nav-item" onclick="showView('tarifario',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><path d="M2 2h12v2H2zM2 7h7v2H2zM2 12h9v2H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="13" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M13 8v1h1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Tarifario
  </div>
  <div class="nav-item" onclick="showView('maquinas',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><rect x="1" y="5" width="14" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="9" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 5V4a1 1 0 011-1h6a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/></svg>
    Máquinas
  </div>
  <div class="nav-item" onclick="showView('sustratos',this)">
    <svg width="15" height="15" fill="none" viewBox="0 0 16 16"><path d="M2 12L5 5l3 5 3-4 3 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Sustratos &amp; Mermas
  </div>
  <div style="padding:0 20px 4px">
    <div onclick="localStorage.removeItem('sustrato_onboarded');window.location.href='onboarding.html'" style="font-size:10px;color:rgba(255,255,255,.2);cursor:pointer;text-align:center;padding:6px;border-radius:4px;transition:color .15s" onmouseover="this.style.color='rgba(255,255,255,.5)'" onmouseout="this.style.color='rgba(255,255,255,.2)'">↩ Ver onboarding (demo)</div>
  </div>
  <div class="sidebar-foot">
    <div class="trial-card">
      <div class="trial-label">Periodo de prueba</div>
      <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px">
        <div class="trial-days">28</div>
        <div class="trial-unit">días restantes</div>
      </div>
      <button class="trial-cta" onclick="showView('plan',null)">Activar plan — $499/mes →</button>
    </div>
  </div>
</nav>

<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="top-title">Nueva cotización</div>
      <div class="page-sub" id="top-sub">Proyecto general · 3 pasos</div>
    </div>
    <div class="timer" id="timer">⏱ 0:00</div>
  </div>
  <div id="app"></div>
</main>

<script>
  // Redirect to onboarding if not registered
  if (!localStorage.getItem('sustrato_onboarded')) {
    window.location.href = 'onboarding.html';
  }
</script>
<script src="js/app.js?v=6"></script>
<script src="js/views/dashboard.js?v=2"></script>
<script src="js/views/cotizar.js?v=3"></script>
<script src="js/views/procesos.js?v=2"></script>
<script src="js/views/maquinas.js?v=3"></script>
<script src="js/views/sustratos.js?v=3"></script>
<script src="js/views/tarifario.js?v=6"></script>
<script src="js/views/clientes.js?v=1"></script>
<script src="js/views/perfil.js?v=1"></script>
<script src="js/views/plan.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</body>
</html>
